<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>distro-picker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐧</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <a href="/" class="logo">🐧 distro-picker</a>
    <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </header>

  <main id="app">
    <!-- Landing -->
    <section id="view-landing" class="view active">
      <div class="hero">
        <h1>Find Your Perfect Linux Distro</h1>
        <p class="hero-sub">Answer a few questions and we'll match you with the ideal distribution and desktop environment.</p>
        <button id="start-quiz" class="btn btn-primary btn-lg">Take the Quiz</button>
      </div>
      <div class="profiles-section">
        <h2 class="profiles-heading">Quick Picks</h2>
        <p class="profiles-sub">Know what you want? Skip the quiz.</p>
        <div id="profiles" class="profiles-grid"></div>
      </div>
    </section>

    <!-- Quiz -->
    <section id="view-quiz" class="view">
      <div class="progress">
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <span class="progress-text" id="progress-text"></span>
      </div>
      <div id="question-container"></div>
      <div class="quiz-nav">
        <button id="btn-back" class="btn btn-ghost">← Back</button>
        <button id="btn-next" class="btn btn-primary">Next →</button>
      </div>
    </section>

    <!-- Results -->
    <section id="view-results" class="view">
      <h2 class="results-title">Your Top Picks</h2>
      <div id="comparison" class="comparison"></div>
      <div id="de-recommendation" class="de-card"></div>
      <details id="other-fits">
        <summary>Other Good Fits</summary>
        <div id="other-fits-grid" class="other-grid"></div>
      </details>
      <div class="results-actions">
        <button id="btn-cheatsheet" class="btn btn-ghost">📄 Export Cheat Sheet</button>
        <button id="btn-restart" class="btn btn-ghost">↩ Start Over</button>
      </div>
    </section>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
